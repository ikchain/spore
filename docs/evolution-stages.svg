<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="100%" stop-color="#718096"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="#888" font-size="14" letter-spacing="8">EVOLUTION STAGES</text>

  <!-- Stage 1: SPORE -->
  <g transform="translate(40, 70)">
    <rect width="200" height="380" rx="12" fill="#0d0d15" stroke="#1a1a2e"/>
    <rect width="200" height="3" rx="1.5" fill="url(#g1)" y="0"/>
    <text x="100" y="35" text-anchor="middle" fill="#718096" font-size="13" font-weight="bold" letter-spacing="4">SPORE</text>
    <text x="100" y="100" text-anchor="middle" fill="#a0aec0" font-size="16">  .·.</text>
    <text x="100" y="120" text-anchor="middle" fill="#a0aec0" font-size="16"> (   )</text>
    <text x="100" y="140" text-anchor="middle" fill="#a0aec0" font-size="16">  `·'</text>
    <text x="100" y="200" text-anchor="middle" fill="#666" font-size="10" font-style="italic">Innocent. Confused.</text>
    <text x="100" y="215" text-anchor="middle" fill="#666" font-size="10" font-style="italic">Just arrived.</text>
    <line x1="20" y1="250" x2="180" y2="250" stroke="#1a1a2e"/>
    <text x="100" y="275" text-anchor="middle" fill="#555" font-size="9" letter-spacing="2">REQUIREMENTS</text>
    <text x="100" y="300" text-anchor="middle" fill="#999" font-size="11">Install it</text>
    <text x="100" y="320" text-anchor="middle" fill="#666" font-size="9">Starting stage</text>
    <text x="100" y="365" text-anchor="middle" fill="#555" font-size="9" font-style="italic">"What's a segfault?"</text>
  </g>

  <!-- Arrow 1 -->
  <text x="255" y="260" text-anchor="middle" fill="#333" font-size="24">→</text>

  <!-- Stage 2: SPRITE -->
  <g transform="translate(275, 70)">
    <rect width="200" height="380" rx="12" fill="#0d1117" stroke="#1a1a2e"/>
    <rect width="200" height="3" rx="1.5" fill="url(#g2)" y="0"/>
    <text x="100" y="35" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="bold" letter-spacing="4">SPRITE</text>
    <text x="100" y="85" text-anchor="middle" fill="#7dd3fc" font-size="16">  ∴ ∵</text>
    <text x="100" y="105" text-anchor="middle" fill="#7dd3fc" font-size="16"> ╱ ◯ ╲</text>
    <text x="100" y="125" text-anchor="middle" fill="#7dd3fc" font-size="16">│ ═══ │</text>
    <text x="100" y="145" text-anchor="middle" fill="#7dd3fc" font-size="16"> ╲   ╱</text>
    <text x="100" y="165" text-anchor="middle" fill="#7dd3fc" font-size="16">  `─'</text>
    <text x="100" y="200" text-anchor="middle" fill="#666" font-size="10" font-style="italic">Playful. Curious.</text>
    <text x="100" y="215" text-anchor="middle" fill="#666" font-size="10" font-style="italic">Starting to understand.</text>
    <line x1="20" y1="250" x2="180" y2="250" stroke="#1a1a2e"/>
    <text x="100" y="275" text-anchor="middle" fill="#555" font-size="9" letter-spacing="2">REQUIREMENTS</text>
    <text x="100" y="300" text-anchor="middle" fill="#e0e0e0" font-size="11">1 stat ≥ 20</text>
    <text x="100" y="320" text-anchor="middle" fill="#e0e0e0" font-size="11">Wisdom ≥ 10</text>
    <text x="100" y="365" text-anchor="middle" fill="#555" font-size="9" font-style="italic">"I like the rhythm."</text>
  </g>

  <!-- Arrow 2 -->
  <text x="490" y="260" text-anchor="middle" fill="#333" font-size="24">→</text>

  <!-- Stage 3: WRAITH -->
  <g transform="translate(510, 70)">
    <rect width="200" height="380" rx="12" fill="#110d17" stroke="#1a1a2e"/>
    <rect width="200" height="3" rx="1.5" fill="url(#g3)" y="0"/>
    <text x="100" y="35" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold" letter-spacing="4">WRAITH</text>
    <text x="100" y="85" text-anchor="middle" fill="#c4b5fd" font-size="16"> ╭─╮</text>
    <text x="100" y="105" text-anchor="middle" fill="#c4b5fd" font-size="16">─┤◈├─</text>
    <text x="100" y="125" text-anchor="middle" fill="#c4b5fd" font-size="16">╭┤ ├╮</text>
    <text x="100" y="145" text-anchor="middle" fill="#c4b5fd" font-size="16">│╰─╯│</text>
    <text x="100" y="165" text-anchor="middle" fill="#c4b5fd" font-size="16">╰┬─┬╯</text>
    <text x="100" y="200" text-anchor="middle" fill="#666" font-size="10" font-style="italic">Opinionated. Dry wit.</text>
    <text x="100" y="215" text-anchor="middle" fill="#666" font-size="10" font-style="italic">Judges your code.</text>
    <line x1="20" y1="250" x2="180" y2="250" stroke="#1a1a2e"/>
    <text x="100" y="275" text-anchor="middle" fill="#555" font-size="9" letter-spacing="2">REQUIREMENTS</text>
    <text x="100" y="300" text-anchor="middle" fill="#e0e0e0" font-size="11">3+ stats ≥ 40</text>
    <text x="100" y="320" text-anchor="middle" fill="#e0e0e0" font-size="11">Wisdom ≥ 25</text>
    <text x="100" y="365" text-anchor="middle" fill="#555" font-size="9" font-style="italic">"I have... opinions."</text>
  </g>

  <!-- Arrow 3 -->
  <text x="725" y="260" text-anchor="middle" fill="#333" font-size="24">→</text>

  <!-- Stage 4: SPECTER -->
  <g transform="translate(745, 70)">
    <rect width="200" height="380" rx="12" fill="#170d0d" stroke="#1a1a2e"/>
    <rect width="200" height="3" rx="1.5" fill="url(#g4)" y="0"/>
    <text x="100" y="35" text-anchor="middle" fill="#f97316" font-size="13" font-weight="bold" letter-spacing="4">SPECTER</text>
    <text x="100" y="80" text-anchor="middle" fill="#fdba74" font-size="16">╔═══╗</text>
    <text x="100" y="100" text-anchor="middle" fill="#fdba74" font-size="16">║ ◉ ◉ ║</text>
    <text x="100" y="120" text-anchor="middle" fill="#fdba74" font-size="16">║  ▽  ║</text>
    <text x="100" y="140" text-anchor="middle" fill="#fdba74" font-size="16">╚═╤═╤═╝</text>
    <text x="100" y="160" text-anchor="middle" fill="#fdba74" font-size="16">░═╡ ╞═░</text>
    <text x="100" y="180" text-anchor="middle" fill="#fdba74" font-size="16">  ╧ ╧</text>
    <text x="100" y="210" text-anchor="middle" fill="#666" font-size="10" font-style="italic">Sardonic. Experienced.</text>
    <text x="100" y="225" text-anchor="middle" fill="#666" font-size="10" font-style="italic">Remembers everything.</text>
    <line x1="20" y1="250" x2="180" y2="250" stroke="#1a1a2e"/>
    <text x="100" y="275" text-anchor="middle" fill="#555" font-size="9" letter-spacing="2">REQUIREMENTS</text>
    <text x="100" y="300" text-anchor="middle" fill="#e0e0e0" font-size="11">4+ stats ≥ 60</text>
    <text x="100" y="320" text-anchor="middle" fill="#e0e0e0" font-size="11">Wisdom ≥ 50</text>
    <text x="100" y="340" text-anchor="middle" fill="#f97316" font-size="11">Age ≥ 30 days</text>
    <text x="100" y="365" text-anchor="middle" fill="#555" font-size="9" font-style="italic">"I remember that rename."</text>
  </g>

  <!-- Arrow 4 -->
  <text x="960" y="260" text-anchor="middle" fill="#333" font-size="24">→</text>

  <!-- Stage 5: PHANTOM -->
  <g transform="translate(980, 70)">
    <rect width="200" height="380" rx="12" fill="#0d1710" stroke="#1a1a2e"/>
    <rect width="200" height="3" rx="1.5" fill="url(#g5)" y="0"/>
    <text x="100" y="35" text-anchor="middle" fill="#10b981" font-size="13" font-weight="bold" letter-spacing="4">PHANTOM</text>
    <text x="100" y="80" text-anchor="middle" fill="#6ee7b7" font-size="16"> ░░▓▓░░</text>
    <text x="100" y="100" text-anchor="middle" fill="#6ee7b7" font-size="16">░▓╔══╗▓░</text>
    <text x="100" y="120" text-anchor="middle" fill="#6ee7b7" font-size="16">▓║ ◆◆ ║▓</text>
    <text x="100" y="140" text-anchor="middle" fill="#6ee7b7" font-size="16">▓║ ═══ ║▓</text>
    <text x="100" y="160" text-anchor="middle" fill="#6ee7b7" font-size="16">░▓╚══╝▓░</text>
    <text x="100" y="180" text-anchor="middle" fill="#6ee7b7" font-size="16"> ░░▓▓░░</text>
    <text x="100" y="210" text-anchor="middle" fill="#666" font-size="10" font-style="italic">Transcendent. Omniscient.</text>
    <text x="100" y="225" text-anchor="middle" fill="#666" font-size="10" font-style="italic">Mildly condescending.</text>
    <line x1="20" y1="250" x2="180" y2="250" stroke="#1a1a2e"/>
    <text x="100" y="275" text-anchor="middle" fill="#555" font-size="9" letter-spacing="2">REQUIREMENTS</text>
    <text x="100" y="300" text-anchor="middle" fill="#e0e0e0" font-size="11">ALL stats ≥ 75</text>
    <text x="100" y="320" text-anchor="middle" fill="#e0e0e0" font-size="11">Wisdom ≥ 90</text>
    <text x="100" y="340" text-anchor="middle" fill="#10b981" font-size="11">Age ≥ 90 days</text>
    <text x="100" y="365" text-anchor="middle" fill="#555" font-size="9" font-style="italic">"You haven't transcended."</text>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="485" text-anchor="middle" fill="#333" font-size="11" letter-spacing="3">born in a terminal · raised by commits</text>
</svg>
